stages:
  - test
  - build
  - publish

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: 1
  BUILDKIT_INLINE_CACHE: 1
  NODE_VERSION: "20"
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm"
  CACHE_KEY_PREFIX: "v1"
  BACKEND_IMAGE: "$DOCKERHUB_USERNAME/chat-backend"
  FRONTEND_IMAGE: "$DOCKERHUB_USERNAME/chat-frontend"
  IMAGE_TAG_SHA: "$CI_COMMIT_SHORT_SHA"
  IMAGE_TAG_BRANCH: "$CI_COMMIT_REF_SLUG"

test:backend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  cache:
    key: "${CACHE_KEY_PREFIX}-backend-${CI_COMMIT_REF_SLUG}"
    paths:
      - backend/node_modules/
      - backend/.npm/
    policy: pull-push
  before_script:
    - cd backend
    - node -v && npm -v
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Running backend unit tests..."
    - npm run test:ci
    - echo "Backend tests completed"
  after_script:
    - cd backend
    - grep -A 3 "All files" coverage/lcov-report/index.html || true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - backend/coverage/
    reports:
      junit: backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage/cobertura-coverage.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

test:frontend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  cache:
    key: "${CACHE_KEY_PREFIX}-frontend-${CI_COMMIT_REF_SLUG}"
    paths:
      - frontend/node_modules/
      - frontend/.npm/
    policy: pull-push
  before_script:
    - cd frontend
    - node -v && npm -v
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Running frontend unit tests..."
    - npm run test:ci
    - echo "Frontend tests completed"
  after_script:
    - cd frontend
    - cat coverage/coverage-summary.json || true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - frontend/coverage/
    reports:
      junit: frontend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

build:backend:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  before_script:
    - docker --version
  script:
    - cd backend
    - |
      docker build \
        --target production \
        --cache-from $BACKEND_IMAGE:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --tag $BACKEND_IMAGE:$IMAGE_TAG_SHA \
        --tag $BACKEND_IMAGE:$IMAGE_TAG_BRANCH \
        --file Dockerfile \
        .
    - echo "Backend image built successfully"
    - echo "Testing image..."
    - docker run --rm $BACKEND_IMAGE:$IMAGE_TAG_SHA node --version
    - echo "Image verification passed"
  after_script:
    - docker images | grep chat-backend || true
    - docker system prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - job: test:backend
      artifacts: false

build:frontend:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    VITE_SOCKET_URL: "${VITE_SOCKET_URL:-http://localhost:3001}"
  before_script:
    - docker --version
  script:
    - cd frontend
    - |
      docker build \
        --target production \
        --cache-from $FRONTEND_IMAGE:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg VITE_SOCKET_URL=$VITE_SOCKET_URL \
        --tag $FRONTEND_IMAGE:$IMAGE_TAG_SHA \
        --tag $FRONTEND_IMAGE:$IMAGE_TAG_BRANCH \
        --file Dockerfile \
        .
    - echo "Frontend image built successfully"
    - echo "Testing image..."
    - docker run --rm $FRONTEND_IMAGE:$IMAGE_TAG_SHA nginx -v
    - echo "Image verification passed"
  after_script:
    - docker images | grep chat-frontend || true
    - docker system prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - job: test:frontend
      artifacts: false

publish:backend:
  stage: publish
  image: docker:24-cli
  services:
    - docker:24-dind
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin docker.io
  script:
    - cd backend
    - |
      docker build \
        --target production \
        --cache-from $BACKEND_IMAGE:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --tag $BACKEND_IMAGE:$IMAGE_TAG_SHA \
        --tag $BACKEND_IMAGE:$IMAGE_TAG_BRANCH \
        --file Dockerfile \
        .
    - docker push $BACKEND_IMAGE:$IMAGE_TAG_SHA
    - docker push $BACKEND_IMAGE:$IMAGE_TAG_BRANCH
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $BACKEND_IMAGE:$IMAGE_TAG_SHA $BACKEND_IMAGE:latest
        docker push $BACKEND_IMAGE:latest
      fi
  after_script:
    - |
      if docker pull $BACKEND_IMAGE:$IMAGE_TAG_SHA 2>/dev/null; then
        echo "Image successfully pulled from Docker Hub"
        docker run --rm $BACKEND_IMAGE:$IMAGE_TAG_SHA node --version
      else
        echo "Failed to pull image from Docker Hub"
        exit 1
      fi
    - docker logout docker.io
    - docker system prune -af
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: on_success
  needs:
    - job: build:backend
      artifacts: false

publish:frontend:
  stage: publish
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    VITE_SOCKET_URL: "${VITE_SOCKET_URL:-http://localhost:3001}"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin docker.io
  script:
    - cd frontend
    - |
      docker build \
        --target production \
        --cache-from $FRONTEND_IMAGE:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg VITE_SOCKET_URL=$VITE_SOCKET_URL \
        --tag $FRONTEND_IMAGE:$IMAGE_TAG_SHA \
        --tag $FRONTEND_IMAGE:$IMAGE_TAG_BRANCH \
        --file Dockerfile \
        .
    - docker push $FRONTEND_IMAGE:$IMAGE_TAG_SHA
    - docker push $FRONTEND_IMAGE:$IMAGE_TAG_BRANCH
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $FRONTEND_IMAGE:$IMAGE_TAG_SHA $FRONTEND_IMAGE:latest
        docker push $FRONTEND_IMAGE:latest
      fi
  after_script:
    - |
      if docker pull $FRONTEND_IMAGE:$IMAGE_TAG_SHA 2>/dev/null; then
        echo "Image successfully pulled from Docker Hub"
        docker run --rm $FRONTEND_IMAGE:$IMAGE_TAG_SHA nginx -v
      else
        echo "Failed to pull image from Docker Hub"
        exit 1
      fi
    - docker logout docker.io
    - docker system prune -af
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: on_success
  needs:
    - job: build:frontend
      artifacts: false
