apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    component: backend
spec:
  selector:
    {{- include "chat-app.selectorLabels" . | nindent 4 }}
    component: backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
    - name: metrics
      port: 9102
      targetPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    component: frontend
spec:
  type: NodePort
  selector:
    {{- include "chat-app.selectorLabels" . | nindent 4 }}
    component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}

