apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: chat-app
    component: backend
spec:
  selector:
    app: chat-app
    component: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: chat-app
    component: frontend
spec:
  type: NodePort
  selector:
    app: chat-app
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
