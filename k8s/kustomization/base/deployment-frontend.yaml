apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: chat-app
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-app
      component: frontend
  template:
    metadata:
      labels:
        app: chat-app
        component: frontend
    spec:
      containers:
        - name: frontend
          image: localhost:5000/chat-app-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 16Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
