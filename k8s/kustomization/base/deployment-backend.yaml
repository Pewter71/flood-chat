apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: chat-app
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-app
      component: backend
  template:
    metadata:
      labels:
        app: chat-app
        component: backend
    spec:
      containers:
        - name: backend
          image: localhost:5000/chat-app-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: chat-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chat-app-secret
                  key: database-url
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
