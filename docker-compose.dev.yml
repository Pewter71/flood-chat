services:
  postgres:
    ports:
      - "5432:5432"
    networks:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://chat:chat@postgres:5432/chat
      - CORS_ORIGIN=http://localhost:5173
      - MAX_MESSAGES=50
      - NODE_ENV=development
    networks:
      - backend
      - frontend
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_SOCKET_URL=http://localhost:3001
    networks:
      - frontend
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
